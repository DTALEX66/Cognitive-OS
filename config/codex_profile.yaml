profile:
  name: codex-cognitive-os-public-profile
  version: 0.1.0
  visibility: public_sanitized
  scope: project_template_not_local_state
  description: Public Codex configuration profile for working on Cognitive-OS.

codex_surfaces:
  desktop_app:
    role: primary_interactive_agent_surface
    notes: Conversation, planning, code edits, verification, and Git coordination happen here.
  cli:
    role: optional_local_execution_surface
    template: .codex.example/config.example.toml
    notes: Use the template only as a portable starting point, not as a real secret-bearing config.
  api:
    role: optional_future_integration
    configured_here: false
    notes: API keys and provider credentials must stay in private local environment files.

workspace:
  default_scope: current_repository
  project_root_placeholder: <project-root>
  writable_runtime_dirs:
    - data/output
    - data/memory
    - data/logs
  ignored_runtime_dirs:
    - data/output
    - data/memory
    - data/logs
    - .venv
    - __pycache__
  protected_drives:
    - E:/
  protected_drive_policy: explicit_user_confirmation_required_before_any_access
  data_boundary_policy:
    default_posture: local_only_project_contained_no_egress
    approved_write_roots:
      - data/output
      - data/memory
      - data/logs
      - workspace/intake
      - workspace/local-imports
      - tests/fixtures
    require_confirmation_before_writing:
      - sibling_project_directories
      - external_drive_roots
      - cloud_sync_directories
      - user_profile_directories
      - source_project_original_directories
    copy_requirements:
      - state_source_path
      - state_target_path
      - state_exclusion_rules
      - state_git_ignore_status

repository_context:
  main_repo:
    name: Cognitive-OS
    remote: git@github.com:DTALEX66/Cognitive-OS.git
    branch: main
  served_projects:
    - name: Knowledge-Base
      route: KB
      role: A_system_understanding_structure_memory_learning
    - name: Inspiration-Research
      route: IR
      role: B_system_research_inspiration_frameworks
  upstream_segments:
    - name: Obsidian
      role: partial_KB_capture_source
      boundary: upstream_input_only_not_whole_system

safety_policy:
  no_private_config_upload: true
  never_commit:
    - .codex/
    - .env
    - .env.*
    - ssh_private_keys
    - github_tokens
    - api_keys
    - cookies
    - browser_login_data
    - model_provider_credentials
  high_risk_requires_confirmation:
    - recursive_delete
    - hard_reset
    - force_push
    - mass_move_or_overwrite
    - cross_drive_operations
    - registry_changes
    - system_environment_changes
    - firewall_or_proxy_changes

shell_policy:
  default_shell: powershell
  prefer_search_tool: rg
  before_modification:
    - git status --short
  after_modification:
    - git diff --stat
    - git status --short
  destructive_commands:
    default: forbidden_without_explicit_confirmation
  git:
    add_policy: explicit_paths_only
    avoid_git_add_dot: true
    commit_requires_user_intent: true
    push_requires_user_intent: true
    force_push: false
    text_encoding: utf-8-no-bom
    required_pre_push_checks:
      - python -m unittest tests.test_encoding_policy
    reject_text_artifacts:
      - utf8_decode_error
      - replacement_character
      - mojibake_marker
      - unexpected_bom

network_policy:
  default: local_first
  allowed_when_user_requests:
    - git_clone
    - git_pull
    - git_push
    - remote_status_verification
    - current_documentation_lookup
  source_preference:
    technical_docs: primary_sources
    openai_docs: official_openai_sources

skills_and_connectors:
  public_notes_only: true
  credentials_stored_here: false
  relevant_skill_categories:
    - code_editing
    - github_repository_work
    - openai_docs_lookup
    - document_and_markdown_work
    - image_generation_when_needed
  connector_rule: connector_tokens_and_account_links_are_private_local_state

reporting:
  language: zh-CN
  final_report_sections:
    - 做了什么
    - 修改了哪些文件
    - 执行了哪些命令
    - 哪些地方没做或不确定
    - 如何回滚
    - 下一步建议
