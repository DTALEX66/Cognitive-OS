profile:
  name: codex-cognitive-os-agent
  version: 0.1.0
  visibility: public_sanitized
  description: Public operating profile for agent work on Cognitive-OS.

project:
  runtime_repo: DTALEX66/Cognitive-OS
  primary_systems:
    knowledge_base:
      repo: DTALEX66/Knowledge-Base
      route: KB
      role: understanding_structure_memory_learning
    inspiration_research:
      repo: DTALEX66/Inspiration-Research
      route: IR
      role: research_comparison_framework_design
  upstream_layers:
    obsidian:
      role: partial_kb_capture_source
      note: Obsidian is an upstream segment, not the whole system.

configuration_categories:
  runtime:
    files:
      - config/settings.yaml
    purpose: app thresholds, execution defaults, memory backend
  models:
    files:
      - config/models.yaml
    purpose: model and embedding provider placeholders
  tools:
    files:
      - config/tools.yaml
    purpose: tool names, risk levels, and default dry-run behavior
  agent:
    files:
      - AGENTS.md
      - config/agent_profile.yaml
      - workspace/configuration/README.md
    purpose: public agent operating rules and configuration catalog
  intake:
    files:
      - workspace/intake/*.md
    purpose: stepwise implementation and design log
  imported_references:
    files:
      - workspace/imports/**
    purpose: selected reusable material copied from Knowledge-Base and Inspiration-Research
  private_local:
    committed: false
    examples:
      - .env
      - .codex
      - ssh_private_keys
      - api_keys
      - tokens
      - data/memory
      - logs
      - virtual_environments

safety:
  workspace_policy:
    default_scope: current_repository
    protected_drive_requires_confirmation:
      - E:/
    no_recursive_whole_disk_scan: true
  secrets_policy:
    never_commit:
      - .env
      - .npmrc
      - .pypirc
      - id_rsa
      - id_ed25519
      - api_keys
      - tokens
      - cookies
      - browser_login_data
  destructive_action_policy:
    require_explicit_confirmation:
      - recursive_delete
      - hard_reset
      - force_push
      - mass_overwrite
      - cross_drive_move
      - registry_or_system_changes

workflow:
  before_edit:
    - run_git_status_short
    - read_relevant_files
    - keep_scope_small
  after_edit:
    - run_minimal_validation
    - run_git_diff_stat
    - run_git_status_short
  staging:
    use_explicit_paths: true
    avoid_git_add_dot: true
  upload:
    remote: git@github.com:DTALEX66/Cognitive-OS.git
    branch: main
    force_push: false

routing:
  routes:
    KB: knowledge, notes, learning, review, memory
    IR: research, papers, github, comparison, frameworks
    TASK: implementation, execution, fixes, generated outputs
    DROP: empty or low-value noise
    REVIEW: high-risk operations or secrets-related content
  principle: risk_first_then_attention_route

ingestion:
  file_ingestion_v1:
    allowed_root: project_root_only
    allowed_extensions:
      - .md
      - .markdown
      - .txt
    max_file_bytes: 2000000
    max_directory_files: 100
    default_pattern: '*.md'

validation:
  python:
    compile: python -m compileall app
  api_smoke:
    preferred: fastapi_testclient
    avoid_long_running_server_when_not_needed: true

reporting:
  final_sections:
    - what_was_done
    - modified_files
    - commands_run
    - not_done_or_uncertain
    - rollback
    - next_steps
